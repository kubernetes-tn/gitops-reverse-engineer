---
# Pattern Matching Reference
# 
# Wildcards:
#   *       - Matches any sequence of characters
#   ?       - Matches any single character
#   [abc]   - Matches any character in the brackets
#   [a-z]   - Matches any character in the range
#   [!abc]  - Matches any character NOT in the brackets
#
# Examples:
#   "kube-*"      → kube-system, kube-public, kube-node-lease
#   "*-temp"      → dev-temp, staging-temp, test-temp
#   "app-?"       → app-a, app-1, app-x (NOT app-12)
#   "app-[0-9]"   → app-0, app-1, ... app-9
#   "app-[a-z]"   → app-a, app-b, ... app-z
#   "[pt]rod-*"   → prod-app, trod-db (NOT dev-app)
#   "*-[!0-9]"    → app-a, app-x (NOT app-1)
#
# Common Patterns:
#   - Exclude all system namespaces: "kube-*"
#   - Exclude temporary namespaces: "*-temp"
#   - Include production: "prod-*"
#   - Include specific environment: "staging-*"
#   - Numbered namespaces: "app-[0-9]*"
#   - Letter suffixes: "service-[a-z]"
