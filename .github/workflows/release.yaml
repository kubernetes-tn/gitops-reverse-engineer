name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -v -race ./...

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint ./chart

  github-release:
    runs-on: ubuntu-latest
    needs: [build-and-push, helm-lint]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          # Update Chart.yaml so the packaged chart carries the correct version
          sed -i "s/^version:.*/version: ${VERSION}/" ./chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" ./chart/Chart.yaml
          helm package ./chart --destination .helm-packages

      - name: Push Helm chart to GHCR OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push .helm-packages/*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          {
            echo "body<<EOF"
            if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ github.ref_name }}" ]; then
              echo "## Initial Release"
            else
              echo "## Changes since ${PREV_TAG}"
              echo ""
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${{ github.ref_name }}"
            fi
            echo ""
            echo ""
            echo "## Quick Start"
            echo ""
            echo "### Docker Image"
            echo '```bash'
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
            echo '```'
            echo ""
            echo "### Makefile"
            echo '```bash'
            echo "make deploy REGISTRY=${{ env.REGISTRY }}/${{ github.repository_owner }} TAG=${{ github.ref_name }} CLUSTER_NAME=my-cluster"
            echo '```'
            echo ""
            echo "### Helm (OCI)"
            echo '```bash'
            echo "helm install gitops-reverse-engineer oci://ghcr.io/${{ github.repository_owner }}/charts/gitops-reverse-engineer \\"
            echo "  --version ${VERSION} \\"
            echo "  --namespace gitops-reverse-engineer-system --create-namespace \\"
            echo "  --set git.repoUrl=https://git.example.com/org/repo.git \\"
            echo "  --set git.clusterName=my-cluster"
            echo '```'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: .helm-packages/*.tgz
