name: Bug Report
description: Report a bug in the GitOps Reverse Engineer admission controller
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: Controller Version
      description: Image tag or commit SHA (e.g., v1.2.0, ghcr.io/kubernetes-tn/gitops-reverse-engineer:v1.2.0)
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: input
    id: kubernetes-version
    attributes:
      label: Kubernetes Version
      description: Output of `kubectl version --short`
      placeholder: "v1.28.3"
    validations:
      required: true

  - type: dropdown
    id: git-provider
    attributes:
      label: Git Provider
      options:
        - Gitea
        - GitHub
        - GitLab
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - Helm OCI (oci://ghcr.io/kubernetes-tn/charts/...)
        - Helm from source (helm template ./chart)
        - Makefile (make deploy)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Controller Logs
      description: |
        Paste relevant logs from: `kubectl logs -n gitops-reverse-engineer-system -l app.kubernetes.io/name=gitops-reverse-engineer --tail=50`
      render: shell

  - type: textarea
    id: values
    attributes:
      label: Helm Values (relevant excerpt)
      description: Paste any non-default values you've configured (redact secrets).
      render: yaml

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information (platform, cluster type, network setup, etc.)
