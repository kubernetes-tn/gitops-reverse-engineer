## @section Metrics parameters
##

## Prometheus metrics
## @param metrics.enabled Enable Prometheus metrics
## @param metrics.port Metrics port
## @param metrics.path Metrics path
## @param metrics.serviceMonitor.enabled Create ServiceMonitor Resource for scraping metrics using Prometheus Operator
## @param metrics.serviceMonitor.namespace Namespace for the ServiceMonitor Resource (defaults to the Release Namespace)
## @param metrics.serviceMonitor.interval Interval at which metrics should be scraped
## @param metrics.serviceMonitor.scrapeTimeout Timeout after which the scrape is ended
## @param metrics.serviceMonitor.relabelings RelabelConfigs to apply to samples before scraping
## @param metrics.serviceMonitor.metricRelabelings MetricRelabelConfigs to apply to samples before ingestion
## @param metrics.serviceMonitor.selector Prometheus instance selector labels
## @param metrics.serviceMonitor.labels Additional labels for ServiceMonitor
## @param metrics.serviceMonitor.honorLabels honorLabels chooses the metric's labels on collisions with target labels
##
metrics:
  enabled: true
  port: 8443
  path: /metrics
  serviceMonitor:
    enabled: true
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    relabelings: []
    metricRelabelings: []
    selector: {}
    labels: {}
    honorLabels: false

## @section Prometheus Rules parameters
##

## Prometheus rules configuration
## @param prometheusRule.enabled Create PrometheusRule Resource for scraping metrics using Prometheus Operator
## @param prometheusRule.namespace Namespace for the PrometheusRule Resource (defaults to the Release Namespace)
## @param prometheusRule.labels Additional labels for PrometheusRule
## @param prometheusRule.groups Prometheus rules groups
##
prometheusRule:
  enabled: true
  namespace: ""
  labels: {}
  groups:
    - name: gitops-reverse-engineer
      rules:
        - alert: GitOpsAdmissionGitSyncFailure
          expr: gitops_admission_git_sync_failures_total > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "GitOps Admission Controller failing to sync to Git"
            description: "The GitOps Admission Controller has failed to sync resources to Git repository. Pending operations: {{ $value }}"

## @section Health Check Configuration
##

## Liveness and readiness probes
## @param livenessProbe.enabled Enable livenessProbe
## @param livenessProbe.initialDelaySeconds Initial delay seconds for livenessProbe
## @param livenessProbe.periodSeconds Period seconds for livenessProbe
## @param livenessProbe.timeoutSeconds Timeout seconds for livenessProbe
## @param livenessProbe.failureThreshold Failure threshold for livenessProbe
## @param livenessProbe.successThreshold Success threshold for livenessProbe
##
livenessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

## @param readinessProbe.enabled Enable readinessProbe
## @param readinessProbe.initialDelaySeconds Initial delay seconds for readinessProbe
## @param readinessProbe.periodSeconds Period seconds for readinessProbe
## @param readinessProbe.timeoutSeconds Timeout seconds for readinessProbe
## @param readinessProbe.failureThreshold Failure threshold for readinessProbe
## @param readinessProbe.successThreshold Success threshold for readinessProbe
##
readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

