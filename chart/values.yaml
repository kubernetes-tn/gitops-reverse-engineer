## @section Global parameters
## Global Docker image parameters
## Please, note that this will override the image parameters, including dependencies, configured to use the global value
## Current available global Docker image parameters: imageRegistry, imagePullSecrets and storageClass
##

## @param global.imageRegistry Global Docker image registry
## @param global.imagePullSecrets Global Docker registry secret names as an array
##
global:
  imageRegistry: ""
  ## E.g.
  ## imagePullSecrets:
  ##   - myRegistryKeySecretName
  ##
  imagePullSecrets: []

## @section Common parameters
##

## @param nameOverride String to partially override common.names.fullname
##
nameOverride: ""

## @param fullnameOverride String to fully override common.names.fullname
##
fullnameOverride: ""

## @param namespaceOverride String to fully override common.names.namespace
##
namespaceOverride: ""

## @param commonLabels Labels to add to all deployed objects
##
commonLabels: {}

## @param commonAnnotations Annotations to add to all deployed objects
##
commonAnnotations: {}

## @section Admission Controller Image Parameters
##

## Gitops Reversed Admission Controller image
## @param image.registry Admission controller image registry
## @param image.repository Admission controller image repository
## @param image.tag Admission controller image tag (immutable tags are recommended)
## @param image.digest Admission controller image digest in the way sha256:aa.... Please note this parameter, if set, will override the tag
## @param image.pullPolicy Admission controller image pull policy
## @param image.pullSecrets Admission controller image pull secrets
##
image:
  registry: ghcr.io/kubernetes-tn
  repository: gitops-reverse-engineer
  tag: gitops-1
  digest: ""
  ## Specify a imagePullPolicy
  ## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
  ## ref: https://kubernetes.io/docs/concepts/containers/images/#pre-pulled-images
  ##
  pullPolicy: IfNotPresent
  ## Optionally specify an array of imagePullSecrets.
  ## Secrets must be manually created in the namespace.
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  ## e.g:
  ## pullSecrets:
  ##   - myRegistryKeySecretName
  ##
  pullSecrets: []

## @section Admission Controller Deployment Parameters
##

## @param replicaCount Number of Admission controller replicas to deploy
##
replicaCount: 1

## @param resources.limits The resources limits for the Admission controller containers
## @param resources.requests The requested resources for the Admission controller containers
##
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

## Configure Pods Security Context
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
## @param podSecurityContext.enabled Enabled Admission controller pods' Security Context
## @param podSecurityContext.fsGroup Set Admission controller pod's Security Context fsGroup
##
podSecurityContext:
  enabled: false
  fsGroup: 1001

## Configure Container Security Context
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container
## @param containerSecurityContext.enabled Enabled containers' Security Context
## @param containerSecurityContext.runAsUser Set containers' Security Context runAsUser
## @param containerSecurityContext.runAsNonRoot Set containers' Security Context runAsNonRoot
## @param containerSecurityContext.privileged Set container's Security Context privileged
## @param containerSecurityContext.readOnlyRootFilesystem Set container's Security Context readOnlyRootFilesystem
## @param containerSecurityContext.allowPrivilegeEscalation Set container's Security Context allowPrivilegeEscalation
## @param containerSecurityContext.capabilities.drop List of capabilities to be dropped
##
containerSecurityContext:
  enabled: false
  runAsUser: 1001
  runAsNonRoot: true
  privileged: false
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

## @section Git Configuration
##

## Git repository configuration
## @param git.provider Git hosting provider: "gitea", "github", or "gitlab"
## @param git.repoUrl Git repository URL for syncing resources
## @param git.token Git authentication token (will be read from secret if existingSecret is provided)
## @param git.existingSecret Name of existing secret containing git token (key: token)
## @param git.clusterName Name of the cluster (used in git path structure)
##
git:
  provider: "gitea"
  repoUrl: "https://git.example.com/sre/cluster-git-reversed.git"
  token: ""
  existingSecret: "git-token"
  clusterName: "platform"

## @section Watch Configuration
##

## Watch configuration for resources and namespaces
## @param watch.clusterWideResources Enable watching cluster-scoped resources (Namespace, PV, etc.)
## @param watch.namespaces.include List of namespace names to watch (empty = all)
## @param watch.namespaces.exclude List of namespace names to exclude from watching
## @param watch.namespaces.includePattern List of glob patterns for namespaces to include (e.g., "prod-*")
## @param watch.namespaces.excludePattern List of glob patterns for namespaces to exclude (e.g., "kube-*")
## @param watch.namespaces.labelSelector Label selector for namespaces to watch
## @param watch.resources.include List of resource kinds to watch (empty = default list)
## @param watch.resources.exclude List of resource kinds to exclude from watching
## @param watch.excludeUsers List of users/serviceaccounts to exclude from watching
##
watch:
  clusterWideResources: false
  namespaces:
    include: []
    exclude: []
    includePattern: []
    excludePattern:
      - "kube-*"
    labelSelector: {}
  resources:
    ## Default resources to watch
    include:
      # Core Workloads
      - Deployment
      - StatefulSet
      - DaemonSet
      - Job
      - CronJob
      # Services & Networking
      - Service
      - Ingress
      - NetworkPolicy
      # Gateway API Resources
      - HTTPRoute
      - Gateway
      - GatewayClass
      - TCPRoute
      - TLSRoute
      - UDPRoute
      # OpenShift Routes
      - Route
      # Configuration & Storage
      - ConfigMap
      - Secret
      - PersistentVolumeClaim
      - PersistentVolume
      # ArgoCD Resources
      - Application
      - ApplicationSet
      - AppProject
      # RBAC
      - Role
      - RoleBinding
      - ClusterRole
      - ClusterRoleBinding
      - ServiceAccount
      # Resource Quotas & Limits
      - ResourceQuota
      - LimitRange
      # HorizontalPodAutoscaler
      - HorizontalPodAutoscaler
    exclude: []
  excludeUsers:
    # Exclude Kubernetes system controllers
    - "system:serviceaccount:kube-system:generic-garbage-collector"
    - "system:serviceaccount:kube-system:persistent-volume-binder"
    # Exclude GitOps controllers to prevent recursive changes
    - "system:serviceaccount:argocd:argocd-application-controller"
    - "system:serviceaccount:flux-system:flux-controller"
    # Add your own exclusions below (e.g., operators, CI/CD bots)
    # - "system:serviceaccount:openshift-gitops:openshift-gitops-argocd-server"
    # - "system:admin"
