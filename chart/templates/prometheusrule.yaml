{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "gitops-reverse-engineer.fullname" . }}
  namespace: {{ default (include "gitops-reverse-engineer.namespace" .) .Values.prometheusRule.namespace }}
  labels:
    {{- include "gitops-reverse-engineer.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    {{- with .Values.prometheusRule.groups }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
