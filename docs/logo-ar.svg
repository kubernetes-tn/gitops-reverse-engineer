    <g stroke="white" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 -32 V2"/>
      <path d="M0 2 C0 24 20 35 34 43"/>
      <path d="M0 2 C0 24 -20 35 -34 43"/>
    </g>

    <circle cx="0" cy="-38" r="6.5" fill="#22C55E"/>
    <circle cx="34" cy="43" r="6.5" fill="white"/>
    <circle cx="-34" cy="43" r="6.5" fill="white"/>
    <circle cx="0" cy="2" r="10.5" fill="white"/>
  </g>

  <!-- TEXT (FIXED POSITIONING) -->
