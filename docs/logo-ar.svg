<svg width="900" height="220" viewBox="0 0 900 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .ar {
        font-family: "Noto Sans Arabic", "Cairo", "IBM Plex Sans Arabic", Tahoma, Arial, sans-serif;
      }
    </style>
  </defs>

  <!-- ICON -->
  <g transform="translate(110,110)">
    <polygon points="0,-64 55,-32 55,32 0,64 -55,32 -55,-32"
