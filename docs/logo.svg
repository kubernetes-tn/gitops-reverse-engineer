<svg width="860" height="180" viewBox="0 0 860 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, sans-serif; }
    </style>
  </defs>

  <!-- ICON -->
  <g transform="translate(90,90)">
    
    <!-- Kubernetes-inspired hex -->
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30"
             fill="#326CE5" opacity="0.14"/>

    <!-- Core -->
    <circle cx="0" cy="0" r="42" fill="#326CE5"/>

    <!-- Reverse flow (top -> bottom split) -->
    <g stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 -30 V0"/>
      <path d="M0 0 C0 22 18 32 32 40"/>
      <path d="M0 0 C0 22 -18 32 -32 40"/>
    </g>

    <!-- Nodes -->
    <circle cx="0" cy="-36" r="6" fill="#22C55E"/>
    <circle cx="32" cy="40" r="6" fill="white"/>
    <circle cx="-32" cy="40" r="6" fill="white"/>

    <!-- Operator center -->
    <circle cx="0" cy="0" r="10" fill="white"/>
  </g>

  <!-- TEXT -->
  <g class="text">
    <text x="180" y="92" font-size="40" font-weight="750" fill="#0F172A">
      GitOps Reverse Engineer
    </text>
    <text x="182" y="124" font-size="18" font-weight="400" fill="#475569">
      Reconstructing GitOps artifacts from Kubernetes runtime state
    </text>
  </g>

</svg>