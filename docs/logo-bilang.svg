<svg width="980" height="220" viewBox="0 0 980 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitOps Reverse Engineer logo</title>
  <desc id="desc">Bilingual logo for GitOps Reverse Engineer with English and Arabic text.</desc>

  <defs>
    <style>
      .en {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, Arial, sans-serif;
      }
      .ar {
        font-family: "Noto Sans Arabic", "Cairo", "IBM Plex Sans Arabic", Tahoma, Arial, sans-serif;
      }
    </style>
  </defs>

  <!-- Icon -->
  <g transform="translate(95,110)">
    <!-- Kubernetes-inspired hex -->
    <polygon points="0,-64 55,-32 55,32 0,64 -55,32 -55,-32"
             fill="#326CE5" opacity="0.14"/>

    <!-- Core circle -->
    <circle cx="0" cy="0" r="44" fill="#326CE5"/>

    <!-- Reverse flow -->
    <g stroke="white" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 -32 V2"/>
      <path d="M0 2 C0 24 20 35 34 43"/>
      <path d="M0 2 C0 24 -20 35 -34 43"/>
    </g>

    <!-- Nodes -->
    <circle cx="0" cy="-38" r="6.5" fill="#22C55E"/>
    <circle cx="34" cy="43" r="6.5" fill="white"/>
    <circle cx="-34" cy="43" r="6.5" fill="white"/>

    <!-- Operator center -->
    <circle cx="0" cy="2" r="10.5" fill="white"/>
  </g>

  <!-- English -->
  <g class="en">
    <text x="190" y="95" font-size="42" font-weight="760" fill="#0F172A">
      GitOps Reverse Engineer
    </text>
    <text x="192" y="128" font-size="18" font-weight="420" fill="#475569">
      Reconstructing GitOps artifacts from Kubernetes runtime state
    </text>
  </g>

  <!-- Arabic -->
  <g class="ar" direction="rtl">
    <text x="790" y="168"
          font-size="22"
          font-weight="600"
          fill="#326CE5"
          text-anchor="end">
      الهندسة العكسية لـ GitOps
    </text>
    <text x="790" y="196"
          font-size="15"
          font-weight="400"
          fill="#475569"
          text-anchor="end">
      إعادة بناء موارد GitOps من حالة تشغيل Kubernetes
    </text>
  </g>
</svg>
